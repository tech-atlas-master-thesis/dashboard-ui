<div class="min-h-[calc(100vh-8rem)] flex flex-col bg-white rounded-3xl p-10">
  @if (keyTechnologyService.data.isLoading()) {
    <div class="flex-1 flex flex-col items-center justify-center gap-4">
      <div
        class="w-10 h-10 border-4 border-gray-200 border-t-black rounded-full animate-spin"
      ></div>
      <span class="text-gray-400 font-light text-sm">Wird geladen…</span>
    </div>
  } @else {
    @if (selectedField()) {
      <div class="text-2xl font-extralight">{{ selectedField()!.label }}</div>
    } @else {
      <div class="text-2xl font-extralight">Schlüsseltechnologiefelder</div>
    }
    <div id="key-technologies" class="flex-1 min-h-0 w-full"></div>
  }
</div>
