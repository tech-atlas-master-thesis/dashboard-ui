<div class="h-full w-full bg-white rounded-3xl p-10 flex flex-col">
  <h1 class="text-2xl font-extralight shrink-0">Basic Network</h1>
  <div class="rounded-3xl mt-5 flex-1 min-h-0 relative">
    @if (networkservice.data.isLoading()) {
      <div class="absolute inset-0 flex flex-col items-center justify-center gap-4">
        <div
          class="w-10 h-10 border-4 border-gray-200 border-t-black rounded-full animate-spin"
        ></div>
        <span class="text-gray-400 font-light text-sm">Netzwerk wird geladen…</span>
      </div>
    } @else {
      <div id="basic-network" class="w-full h-full"></div>
    }
  </div>
</div>
